name: Deploy to GitHub Pages
on:
  push:
    branches: [main]

# 必須加上這個權限設定，GitHub Actions 才能把編譯好的檔案推送到 gh-pages 分支
permissions:
  contents: write

# 解決 Node.js 20 棄用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install and Build
        run: |
          npm install
          npm run build
          
      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
